<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Básica</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }

        .container {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 320px;
        }

        h2 {
            margin-top: 0;
            color: #333;
        }

        .screen {
            width: 100%;
            height: 50px;
            background-color: #252525;
            color: #00ff66;
            text-align: right;
            padding: 10px;
            font-size: 1.5rem;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #e0e0e0;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #d5d5d5;
        }

        button.operator {
            background-color: #ff9500;
            color: white;
        }

        button.operator:hover {
            background-color: #e08400;
        }

        button.clear {
            background-color: #ff3b30;
            color: white;
        }

        button.clear:hover {
            background-color: #d32f2f;
        }

        button.equal {
            background-color: #34c759;
            color: white;
            grid-column: span 2;
        }

        button.equal:hover {
            background-color: #28a745;
        }

        .nav-btn {
            margin-top: 20px;
            background-color: #007aff;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            transition: background 0.2s;
        }

        .nav-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Calculadora</h2>
        <input type="text" id="display" class="screen" readonly value="0">
        
        <div class="btn-grid">
            <button class="clear" onclick="clearScreen()">C</button>
            <button class="operator" onclick="appendOperator('^')">^</button>
            <button class="operator" onclick="calculateFactorial()">x!</button>
            <button class="operator" onclick="appendOperator('/')">/</button>
            
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('*')">*</button>
